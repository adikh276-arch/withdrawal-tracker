server {
    listen 80;

    # Support the subpath hosting
    location /withdrawal_tracker/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /withdrawal_tracker/index.html;
    }

    # Redirect root to subpath
    location = / {
        return 301 /withdrawal_tracker/;
    }

    # Fallback to subpath index for 404s
    error_page 404 /withdrawal_tracker/index.html;
}
